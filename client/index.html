    <!-- Critical CSS Inline (add later if needed) -->
    <style>
      /* Critical above-the-fold styles */
      body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }

      /* Unified pre-React loading screen — mirrors LoadingScreen.tsx / .app-loader
         in index.css so the hand-off to React is seamless. */
      .app-loader {
        position: fixed; inset: 0; z-index: 2000;
        display: flex; align-items: center; justify-content: center;
        background: #ffffff;
      }
      .app-loader__stage { position: relative; width: 160px; height: 160px; }
      .app-loader__spinner {
        position: absolute; inset: 0; width: 160px; height: 160px;
        transform-origin: 50% 50%;
        animation: app-loader-spin 1.1s linear infinite;
      }
      .app-loader__ring { display: block; width: 160px; height: 160px; }
      .app-loader__logo {
        position: absolute; top: 50%; left: 50%;
        width: 116px; height: 116px; margin: -58px 0 0 -58px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 9999px; background: #ffffff; overflow: hidden;
      }
      .app-loader__logo img { width: 78%; height: 78%; object-fit: contain; }
      @keyframes app-loader-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        .app-loader__spinner { animation-duration: 2.4s; }
      }
    </style>
